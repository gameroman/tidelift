<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>npm Tidelift Valuator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8">

    <div class="max-w-3xl mx-auto">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-slate-900 mb-2">npm Tidelift Valuator</h1>
            <p class="text-slate-600">Find packages with "tidelift" in README/package.json and >10k monthly downloads.</p>
        </header>

        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 mb-6">
            <div class="flex gap-2">
                <input 
                    type="text" 
                    id="username" 
                    placeholder="npm username (e.g. sindresorhus)" 
                    class="flex-1 px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent"
                >
                <button 
                    id="runBtn" 
                    class="bg-[#cb3837] hover:bg-[#ad2f2e] text-white px-6 py-2 rounded-lg font-semibold transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
                >
                    Analyze
                </button>
            </div>
        </div>

        <!-- Stats Dashboard -->
        <div id="statsGrid" class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6 hidden">
            <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                <p class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Total Packages</p>
                <p id="statTotal" class="text-2xl font-bold text-slate-900">0</p>
            </div>
            <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                <p class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Qualifying</p>
                <p id="statQualifying" class="text-2xl font-bold text-green-600">0</p>
            </div>
            <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm border-l-4 border-l-green-500">
                <p class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Estimated Value</p>
                <p id="statValue" class="text-2xl font-bold text-slate-900">$0</p>
            </div>
        </div>

        <!-- Progress Log -->
        <div class="bg-slate-900 rounded-xl p-4 mb-6 hidden" id="logContainer">
            <div class="flex justify-between items-center mb-2">
                <span class="text-xs font-mono text-slate-400 uppercase">System Log</span>
                <span id="progressPercent" class="text-xs font-mono text-slate-400">0%</span>
            </div>
            <div id="log" class="font-mono text-sm text-green-400 h-48 overflow-y-auto space-y-1">
                <div>Waiting for input...</div>
            </div>
        </div>

        <!-- Results Table -->
        <div id="resultsContainer" class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden hidden">
            <table class="w-full text-left border-collapse">
                <thead class="bg-slate-50 border-b border-slate-200">
                    <tr>
                        <th class="px-6 py-3 text-xs font-semibold text-slate-500 uppercase">Package</th>
                        <th class="px-6 py-3 text-xs font-semibold text-slate-500 uppercase text-right">Downloads</th>
                    </tr>
                </thead>
                <tbody id="resultsBody" class="divide-y divide-slate-100">
                    <!-- Results injected here -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const usernameInput = document.getElementById('username');
        const runBtn = document.getElementById('runBtn');
        const logEl = document.getElementById('log');
        const logContainer = document.getElementById('logContainer');
        const resultsContainer = document.getElementById('resultsContainer');
        const resultsBody = document.getElementById('resultsBody');
        const statsGrid = document.getElementById('statsGrid');
        
        const statTotal = document.getElementById('statTotal');
        const statQualifying = document.getElementById('statQualifying');
        const statValue = document.getElementById('statValue');
        const progressPercent = document.getElementById('progressPercent');

        function updateLog(msg, isMatch = false) {
            const div = document.createElement('div');
            if (isMatch) div.className = 'text-yellow-300 font-bold';
            div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logEl.appendChild(div);
            logEl.scrollTop = logEl.scrollHeight;
        }

        async function analyzeUser() {
            const username = usernameInput.value.trim();
            if (!username) return;

            // Reset UI
            runBtn.disabled = true;
            logContainer.classList.remove('hidden');
            statsGrid.classList.remove('hidden');
            resultsContainer.classList.add('hidden');
            resultsBody.innerHTML = '';
            logEl.innerHTML = '';
            
            let allPackages = [];
            let qualifyingCount = 0;
            let from = 0;
            const size = 250;
            let total = 0;

            try {
                updateLog(`Fetching package list for ${username}...`);
                
                // 1. Pagination loop for names
                do {
                    const searchUrl = `https://registry.npmjs.org/-/v1/search?text=maintainer:${username}&size=${size}&from=${from}`;
                    const res = await fetch(searchUrl);
                    const data = await res.json();
                    
                    if (!data.objects) break;
                    
                    allPackages.push(...data.objects);
                    total = data.total;
                    from += size;
                    
                    statTotal.textContent = allPackages.length;
                    updateLog(`Retrieved ${allPackages.length} / ${total} names...`);
                } while (allPackages.length < total);

                updateLog(`Starting deep analysis of ${allPackages.length} packages...`);

                // 2. Iterate and filter
                for (let i = 0; i < allPackages.length; i++) {
                    const pkg = allPackages[i];
                    const name = pkg.package.name;
                    
                    // Update progress UI
                    const percent = Math.round(((i + 1) / allPackages.length) * 100);
                    progressPercent.textContent = `${percent}%`;

                    try {
                        // Fetch full metadata (README and package.json)
                        const detailRes = await fetch(`https://registry.npmjs.org/${name}`);
                        const detailData = await detailRes.json();
                        
                        const latest = detailData['dist-tags']?.latest;
                        if (!latest) continue;

                        const pkgJson = detailData.versions?.[latest] || {};
                        const readme = detailData.readme || "";

                        const hasTidelift = 
                            readme.toLowerCase().includes('tidelift') || 
                            JSON.stringify(pkgJson).toLowerCase().includes('tidelift');

                        if (hasTidelift) {
                            // Fetch downloads (last month)
                            const statsRes = await fetch(`https://api.npmjs.org/downloads/point/last-month/${name}`);
                            const statsData = await statsRes.json();
                            const downloads = statsData.downloads || 0;

                            if (downloads > 10000) {
                                qualifyingCount++;
                                updateLog(`MATCH: ${name} (>10k downloads)`, true);
                                
                                // Update Stats
                                statQualifying.textContent = qualifyingCount;
                                statValue.textContent = `$${(qualifyingCount * 50).toLocaleString()}`;
                                
                                // Show Table and add row
                                resultsContainer.classList.remove('hidden');
                                const row = `
                                    <tr class="hover:bg-slate-50 transition-colors">
                                        <td class="px-6 py-4 font-medium text-slate-900">${name}</td>
                                        <td class="px-6 py-4 text-right text-slate-600 font-mono text-sm">${downloads.toLocaleString()}</td>
                                    </tr>
                                `;
                                resultsBody.insertAdjacentHTML('beforeend', row);
                            }
                        }
                    } catch (e) {
                        updateLog(`Skipped ${name}: network error`);
                    }
                }

                updateLog(`Analysis complete. Found ${qualifyingCount} qualifying packages.`);

            } catch (err) {
                updateLog(`FATAL ERROR: ${err.message}`);
            } finally {
                runBtn.disabled = false;
            }
        }

        runBtn.addEventListener('click', analyzeUser);
        usernameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') analyzeUser();
        });
    </script>
</body>
</html>
