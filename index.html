<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>npm Tidelift Valuator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8">

    <div class="max-w-3xl mx-auto">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-slate-900 mb-2">npm Tidelift Valuator</h1>
            <p class="text-slate-600">Find packages with "tidelift" in README/package.json and >10k monthly downloads.</p>
        </header>

        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 mb-6">
            <div class="flex gap-2">
                <input 
                    type="text" 
                    id="username" 
                    placeholder="npm username (e.g. sindresorhus)" 
                    class="flex-1 px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent"
                >
                <button 
                    id="runBtn" 
                    class="bg-[#cb3837] hover:bg-[#ad2f2e] text-white px-6 py-2 rounded-lg font-semibold transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
                >
                    Analyze
                </button>
            </div>
            <!-- Progress Bar -->
            <div id="progressContainer" class="mt-4 hidden">
                <div class="flex justify-between mb-1">
                    <span class="text-xs font-semibold text-slate-600" id="progressLabel">Analyzing...</span>
                    <span class="text-xs font-semibold text-slate-600" id="progressPercent">0%</span>
                </div>
                <div class="w-full bg-slate-200 rounded-full h-1.5">
                    <div id="progressBar" class="bg-red-500 h-1.5 rounded-full transition-all duration-300" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <!-- Stats Dashboard -->
        <div id="statsGrid" class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6 hidden">
            <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm text-center">
                <p class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Total Packages</p>
                <p id="statTotal" class="text-2xl font-bold text-slate-900">0</p>
            </div>
            <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm text-center">
                <p class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Qualifying</p>
                <p id="statQualifying" class="text-2xl font-bold text-green-600">0</p>
            </div>
            <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm border-l-4 border-l-green-500 text-center">
                <p class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Estimated Value</p>
                <p id="statValue" class="text-2xl font-bold text-slate-900">$0</p>
            </div>
        </div>

        <!-- Results Table -->
        <div id="resultsContainer" class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden hidden">
            <table class="w-full text-left border-collapse">
                <thead class="bg-slate-50 border-b border-slate-200">
                    <tr>
                        <th class="px-6 py-3 text-xs font-semibold text-slate-500 uppercase">Package</th>
                        <th class="px-6 py-3 text-xs font-semibold text-slate-500 uppercase text-right">Downloads (Last Month)</th>
                    </tr>
                </thead>
                <tbody id="resultsBody" class="divide-y divide-slate-100">
                    <!-- Results injected here -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const usernameInput = document.getElementById('username');
        const runBtn = document.getElementById('runBtn');
        const progressContainer = document.getElementById('progressContainer');
        const progressBar = document.getElementById('progressBar');
        const progressPercent = document.getElementById('progressPercent');
        const progressLabel = document.getElementById('progressLabel');
        const resultsContainer = document.getElementById('resultsContainer');
        const resultsBody = document.getElementById('resultsBody');
        const statsGrid = document.getElementById('statsGrid');
        
        const statTotal = document.getElementById('statTotal');
        const statQualifying = document.getElementById('statQualifying');
        const statValue = document.getElementById('statValue');

        let qualifyingPackages = [];

        function renderResults() {
            // Sort by downloads descending
            qualifyingPackages.sort((a, b) => b.downloads - a.downloads);
            
            resultsBody.innerHTML = qualifyingPackages.map(pkg => `
                <tr class="hover:bg-slate-50 transition-colors">
                    <td class="px-6 py-4 font-medium text-slate-900">${pkg.name}</td>
                    <td class="px-6 py-4 text-right text-slate-600 font-mono text-sm">${pkg.downloads.toLocaleString()}</td>
                </tr>
            `).join('');
            
            if (qualifyingPackages.length > 0) {
                resultsContainer.classList.remove('hidden');
            }
        }

        async function analyzeUser() {
            const username = usernameInput.value.trim();
            if (!username) return;

            // Reset UI
            runBtn.disabled = true;
            progressContainer.classList.remove('hidden');
            statsGrid.classList.remove('hidden');
            resultsContainer.classList.add('hidden');
            resultsBody.innerHTML = '';
            qualifyingPackages = [];
            
            let allPackages = [];
            let from = 0;
            const size = 250;
            let total = 0;

            try {
                progressLabel.textContent = "Fetching package list...";
                
                // 1. Pagination loop for names
                do {
                    const searchUrl = `https://registry.npmjs.org/-/v1/search?text=maintainer:${username}&size=${size}&from=${from}`;
                    const res = await fetch(searchUrl);
                    const data = await res.json();
                    
                    if (!data.objects) break;
                    
                    allPackages.push(...data.objects);
                    total = data.total;
                    from += size;
                    
                    statTotal.textContent = allPackages.length;
                } while (allPackages.length < total);

                progressLabel.textContent = `Analyzing ${allPackages.length} packages...`;

                // 2. Iterate and filter
                for (let i = 0; i < allPackages.length; i++) {
                    const pkg = allPackages[i];
                    const name = pkg.package.name;
                    
                    const percent = Math.round(((i + 1) / allPackages.length) * 100);
                    progressBar.style.width = `${percent}%`;
                    progressPercent.textContent = `${percent}%`;

                    try {
                        const detailRes = await fetch(`https://registry.npmjs.org/${name}`);
                        const detailData = await detailRes.json();
                        
                        const latest = detailData['dist-tags']?.latest;
                        if (!latest) continue;

                        const pkgJson = detailData.versions?.[latest] || {};
                        const readme = detailData.readme || "";

                        const hasTidelift = 
                            readme.toLowerCase().includes('tidelift') || 
                            JSON.stringify(pkgJson).toLowerCase().includes('tidelift');

                        if (hasTidelift) {
                            const statsRes = await fetch(`https://api.npmjs.org/downloads/point/last-month/${name}`);
                            const statsData = await statsRes.json();
                            const downloads = statsData.downloads || 0;

                            if (downloads > 10000) {
                                qualifyingPackages.push({ name, downloads });
                                
                                statQualifying.textContent = qualifyingPackages.length;
                                statValue.textContent = `$${(qualifyingPackages.length * 50).toLocaleString()}`;
                                
                                renderResults();
                            }
                        }
                    } catch (e) {
                        // Silent fail on individual package error to keep going
                    }
                }

                progressLabel.textContent = "Analysis complete";

            } catch (err) {
                progressLabel.textContent = "Error occurred";
                console.error(err);
            } finally {
                runBtn.disabled = false;
            }
        }

        runBtn.addEventListener('click', analyzeUser);
        usernameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') analyzeUser();
        });
    </script>
</body>
</html>
